spring.application.name=secure-div

#DB Config for Postgres
#spring.datasource.url=${DB_URL}
#spring.datasource.username=postgres.${DB_USERNAME}
#spring.datasource.password=${DB_PASSWORD}

#DB Config for MySql
spring.datasource.url=${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

#FlyWay Config
spring.flyway.enabled=false

#Hibernate Config
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.mvc.async.request-timeout=5000

#Hikari Config
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=300000

# MinIO (Development)
s3.endpoint=${MIN_ENDPOINT}
s3.access-key-id=${MIN_ACCESS_KEY_ID}
s3.secret-access-key=${MIN_SECRET_ACCESS_KEY}
s3.bucket-name=${MIN_BUCKET_NAME}
s3.region=${MIN_REGION}
s3.path-style-enabled=true

# R2 (Production) - override via environment variables
# s3.endpoint=${R2_ENDPOINT}
# s3.access-key-id=${R2_ACCESS_KEY_ID}
# s3.secret-access-key=${R2_SECRET_ACCESS_KEY}
# s3.bucket-name=${R2_BUCKET_NAME}
# s3.region=${R2_REGION}
# s3.path-style-enabled=false

#Base Url
base-url=${BASE_URL}

#WEBHOOK
webhook-secret=${WEBHOOK_SECRET}
webhook-url=${WEBHOOK_URL}


